spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.url=jdbc:postgresql://${DB_HOST:db_brn}:${DB_PORT:5432}/${POSTGRES_DB:brn}

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Hibernate tuning
spring.jpa.properties.hibernate.query.plan_cache_max_size=256
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true

# Tomcat thread pool
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=50
server.tomcat.accept-count=10

# Disable Swagger in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Disable file logging in production (use stdout via Docker log driver)
logging.file.name=
logging.file.path=
