<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Brn Tests</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {{content-for "head"}}
    {{content-for "test-head"}}

    <link rel="stylesheet" href="{{rootURL}}assets/vendor.css">
    <link rel="stylesheet" href="{{rootURL}}assets/brn.css">
    <link rel="stylesheet" href="{{rootURL}}assets/test-support.css">

    {{content-for "head-footer"}}
    {{content-for "test-head-footer"}}
  </head>
  <body>
    {{content-for "body"}}
    {{content-for "test-body"}}

    <div id="qunit"></div>
    <div id="qunit-fixture">
      <div id="ember-testing-container">
        <div id="ember-testing"></div>
      </div>
    </div>

    <script src="/testem.js" integrity=""></script>
    <script>
      // ember-auto-import 2.x loads QUnit via webpack chunks that are injected
      // after vendor.js by the build. test-support.js calls
      // Testem.hookIntoTestFramework() at file scope before QUnit is available
      // as a global, causing a "unable to detect a test framework" error.
      // Defer the hook call until ember-qunit's start() loads QUnit properly.
      if (typeof Testem !== 'undefined') {
        var _origHook = Testem.hookIntoTestFramework;
        Testem.hookIntoTestFramework = function() {
          if (typeof QUnit !== 'undefined' || typeof mocha !== 'undefined' || typeof jasmine !== 'undefined') {
            return _origHook.call(Testem);
          }
          // Will be called again by ember-qunit after QUnit is loaded via webpack
        };
      }
    </script>
    <script src="{{rootURL}}assets/vendor.js"></script>
    <script src="{{rootURL}}assets/test-support.js"></script>
    <script src="{{rootURL}}assets/brn.js"></script>
    <script src="{{rootURL}}assets/tests.js"></script>

    {{content-for "body-footer"}}
    {{content-for "test-body-footer"}}
  </body>
</html>
