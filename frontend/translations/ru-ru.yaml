description:
  tabs:
    users: Для пользователей
    developers: Для разработчиков
  users:
    header: "BrainUp — бесплатный онлайн-тренажер для развития слуха и понимания речи!"
    intro:
      "Здравствуйте! Вы зашли на уникальную платформу, созданную, чтобы помочь вам или вашим близким лучше слышать и понимать речь.
      Мы не просто усиляем звук — мы тренируем ваш мозг распознавать слова, фразы, предложения, речь."
    audience:
      header: Для кого создан BrainUp?
      0:
        "<b>Для людей после кохлеарной имплантации (КИ).</b> После операции мозг получает новые сигналы и должен научиться их «расшифровывать».
        BrainUp — это ваша ежедневная реабилитация, ключ к успеху."
      1:
        "<b>Для слабослышащих и тех, кто начинает терять слух.</b> Если вы замечаете, что «слышите, но не разбираете слов», особенно в шуме — это знак.
        Тренажер поможет сохранить и улучшить навык понимания речи, замедлить изоляцию."
      2: "<b>Для всех, кто хочет тренировать слуховое внимание и восприятие.</b>"
    importance:
      header: Почему это важно?
      text:
        "Проблемы со слухом — это часто проблема мозга, а не только уха. Мозг разучивается обрабатывать нечёткие звуковые сигналы.
        BrainUp предлагает научно обоснованную тренировку слуховой коры, подобную физкультуре для слуха.
        Для русскоговорящих людей это первый и единственный подобный бесплатный ресурс."
    how_it_works:
      header: "Как это работает? (Просто начните!)"
      0: "<b>Регистрация.</b> Создайте личный кабинет, чтобы мы могли подстраиваться под вас."
      1: "<b>Адаптивный старт.</b> Система оценит ваш начальный уровень понимания речи."
      2:
        "<b>Персонализированные тренировки.</b> Вас ждёт более 3000 аудиоупражнений. Их сложность будет автоматически подстраиваться
        под ваши успехи: становиться легче или сложнее, чтобы дать оптимальную нагрузку."
      3: "<b>Прогресс и статистика.</b> В личном кабинете вы всегда видите, как часто и насколько успешно вы занимаетесь. Это мотивирует и показывает динамику."
    exercises:
      header: Что здесь есть?
      intro: "Упражнения разделены на блоки, чтобы тренировать разные навыки:"
      0: "<b>Слова:</b> Учимся чётко различать отдельные слова в тишине и в шуме."
      1: "<b>Группы слов (Матрицы):</b> Тренируемся понимать короткие фразы, где логика не подскажет пропущенное слово. Отличная методика для концентрации."
      2: "<b>Фразы:</b> Учимся слышать окончания, предлоги, частицу «НЕ» — то, что часто «теряется»."
      3: "<b>Неречевые звуки (в разработке):</b> Тренировка базового слухового внимания."
    recommendations:
      header: Как лучше заниматься? Главные правила
      0: "<b>Регулярность важнее результата.</b> Оптимально — 30 минут в день, минимум 5-6 раз в неделю."
      1: "<b>Не гонитесь за 100% правильных ответов.</b> Если упражнение даётся тяжело — это хорошо! Значит, мозг активно работает. Повторяйте сложные задания."
      2: "<b>Главная цель — не «отгадать», а максимально вслушаться.</b> Расслабьтесь и сконцентрируйтесь на звуке."
      3: "<b>Не используйте наушники</b> для лучшей имитации нахождения в открытом слуховом пространстве."
    who_we_are:
      header: Кто мы и почему это бесплатно?
      intro:
        "BrainUp — некоммерческий проект, созданный и поддерживаемый командой волонтёров: разработчиков, сурдопедагогов и энтузиастов.
        Мы верим, что помощь в слуховой реабилитации должна быть доступна каждому."
      0: "<b>Методика:</b> основана на разработках ведущего специалиста по слуховой реабилитации, профессора Инны Васильевны Королёвой."
      1: "<b>Контент:</b> подготовлен профессиональными сурдопедагогами."
      2: "<b>Технологии:</b> платформа написана на Kotlin и поддерживается волонтёрами из разных стран."
    help:
      header: Если вы хотите помочь проекту?
      0: Расскажите о нас тем, кому это может быть нужно.
      1: Сообщайте об ошибках или неточностях через специальную форму.
      2: "Если вы IT-специалист (Kotlin, Ember.js, Angular, QA, DevOps, дизайнер) и хотите стать волонтёром — пишите основателю проекта, Елене Мошниковой, в Telegram: "
    welcome: "Добро пожаловать в BrainUp! Ваш путь к более ясному миру звуков начинается здесь."
    cta: Начать тренировку
  dev:
    header: "О проекте '<span class=\"text-indigo-600\">'BrainUp'</span>'"
    intro:
      "Хотите, чтобы ваш код и ваши решения напрямую меняли качество жизни людей? Присоединяйтесь к команде проекта BrainUp."
    done:
      header: Что уже сделано и работает?
      text:
        "Мы, команда волонтёров из разных стран, с 2019 года разработали, запустили и поддерживаем бесплатный
        онлайн-тренажер для развития слуха и понимания речи. Это не прототип. Это рабочий продукт в продакшене,
        которым уже сегодня пользуются люди."
      features_header: "Ключевые возможности запущенного продукта:"
      features:
        0: Более 3 000 разнообразных упражнений в аудиоформате.
        1:
          "Умная адаптивная система: сложность упражнений автоматически подстраивается под уровень слышания и понимания
          речи каждого пользователя, обеспечивая максимально эффективную персонализированную проработку."
        2: Личный кабинет с подробной статистикой и трекингом динамики занятий.
        3: Адаптивный интерфейс, удобный на любом устройстве.
        4: "Стек: Backend написан на Kotlin, фронтенд — на Ember.js/Angular."
    target_users:
      header: Кто наши пользователи и почему это критически важно?
      0:
        "Люди после кохлеарной имплантации: для них это инструмент ежедневной реабилитации, чтобы научиться расшифровывать
        новые сигналы от импланта в членораздельную речь. От таких тренировок зависит успех всей операции."
      1:
        "Люди с потерей слуха (слабослышащие): тренажер помогает сохранить и натренировать способность разбирать речь в шуме,
        замедлить процесс изоляции и улучшить качество общения."
      2: Дети от 6 лет, начинающие терять слух.
    uniqueness:
      header: В чём наша уникальность и сила?
      0: Работающий и бесплатный продукт. Упражнения доступны всем 24/7.
      1: Единственный научно-обоснованный аналог для русскоговорящих на фоне дорогих западных программ.
      2: "Основа — методика ведущего эксперта (проф. И.В. Королёва) и контент от ведущих сурдопедагогов."
      3: "Решаем проблему «слышу, но не понимаю» на уровне обработки сигналов мозгом."
    growth:
      header: Проект живёт, растёт и нуждается в развитии!
      intro: "Перед нами стоят новые амбициозные задачи, и нам очень нужны ваши руки и expertise:"
      tasks:
        0:
          "Развитие функционала: создание нового модуля для диагностики слуха для составления прогресса пользователя,
          создание новых типов упражнений, углубление аналитики, улучшение лендинга сайта."
        1: "Масштабирование и оптимизация: улучшение архитектуры, производительности и отказоустойчивости для растущей аудитории."
        2: "Улучшение UX/UI: делаем и без того удобный интерфейс еще более доступным и вовлекающим."
        3: "Тестирование и надёжность: обеспечение высочайшего качества постоянно развивающегося продукта с живыми пользователями."
    volunteers:
      header: Сейчас нам нужны волонтёры
      0: Backend-разработчики (Kotlin)
      1: Frontend-разработчики (Ember.js / Angular)
      2: QA-инженеры / Автотестеры
      3: DevOps / Системные администраторы
      4: UX/UI-дизайнеры
      5: Менеджеры продукта и аналитики
    benefits:
      header: Что вы получите, присоединившись?
      0: Реальный, измеримый социальный вклад. Вы видите, как ваша работа помогает конкретным людям здесь и сейчас.
      1:
        "Опыт работы с production-проектом с живыми пользователями, сложной логикой и большим объёмом контента
        на современном стеке технологий."
      2: "Свободу для технологических инициатив в рамках продукта, который действительно нужен."
    cta:
      header: Хотите увидеть продукт, задать вопрос или присоединиться?
      0: "Зайдите и попробуйте сами: "
      1: Расскажите коллегам, кому это может быть откликом.
      2: Расскажите знакомым, кому это может быть полезно как потенциальным пользователям.
      3: "Наша кодовая база и задачи здесь: "
      4: "По вопросам участия свяжитесь с основателем проекта, Еленой Мошниковой, в Telegram: "
    closing: Давайте вместе развивать проект, который уже работает и меняет жизни.
    signature: "С уважением, Команда проекта BrainUp."
  team:
    header: Познакомьтесь с нашей командой
    thanks_words: 'Мы рады всем ребятам, которые помогали в разное время, и тем, кто продолжает разрабатывать эту платформу.'
