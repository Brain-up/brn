about_us:
  advantages: Как работает BrainUp
  train30: Три блока отвечают на главные вопросы пользователя.
  adv1:
    badge: Наушники
    title: ТРЕНИРУЙТЕ СЛУХ
    content: Слушайте звуки, слоги, слова и фразы. Учитесь различать похожие
      звуки, понимать речь в шуме и разговоры по телефону. Тренажер
      адаптируется под ваш уровень — от простого к сложному.
  adv2:
    badge: Прогресс
    title: ЗАМЕЧАЙТЕ ПРОГРЕСС
    content: Каждое занятие укрепляет нейронные связи, отвечающие за слух. Вы
      начнете лучше понимать собеседников, увереннее общаться и возвращать
      звуки, которые казались потерянными.
  adv3:
    badge: Врачи-сурдологи
    title: ДОВЕРЯЙТЕ НАУКЕ
    content: Упражнения созданы врачами-сурдологами и основаны на принципе
      нейропластичности мозга. Программа бесплатна — BrainUp является
      благотворительным проектом.
  cta: Начать тренировку

