description:
  tabs:
    users: Для пользователей
    developers: Для врачей-специалистов
  users:
    header: "BrainUp — бесплатный онлайн-тренажер для развития слуха и понимания речи!"
    intro:
      "Здравствуйте! Вы зашли на уникальную платформу, созданную, чтобы помочь вам или вашим близким лучше слышать и понимать речь.
      Мы не просто усиляем звук — мы тренируем ваш мозг распознавать слова, фразы, предложения, речь."
    audience:
      header: Для кого создан BrainUp?
      0:
        "<b>Для людей после кохлеарной имплантации (КИ).</b> После операции мозг получает новые сигналы и должен научиться их «расшифровывать».
        BrainUp — это ваша ежедневная реабилитация, ключ к успеху."
      1:
        "<b>Для слабослышащих и тех, кто начинает терять слух.</b> Если вы замечаете, что «слышите, но не разбираете слов», особенно в шуме — это знак.
        Тренажер поможет сохранить и улучшить навык понимания речи, замедлить изоляцию."
      2: "<b>Для всех, кто хочет тренировать слуховое внимание и восприятие.</b>"
    importance:
      header: Почему это важно?
      text:
        "Проблемы со слухом — это часто проблема мозга, а не только уха. Мозг разучивается обрабатывать нечёткие звуковые сигналы.
        BrainUp предлагает научно обоснованную тренировку слуховой коры, подобную физкультуре для слуха.
        Для русскоговорящих людей это первый и единственный подобный бесплатный ресурс."
    how_it_works:
      header: "Как это работает? (Просто начните!)"
      0: "<b>Регистрация.</b> Создайте личный кабинет, чтобы мы могли подстраиваться под вас."
      1: "<b>Адаптивный старт.</b> Система оценит ваш начальный уровень понимания речи."
      2:
        "<b>Персонализированные тренировки.</b> Вас ждёт более 3000 аудиоупражнений. Их сложность будет автоматически подстраиваться
        под ваши успехи: становиться легче или сложнее, чтобы дать оптимальную нагрузку."
      3: "<b>Прогресс и статистика.</b> В личном кабинете вы всегда видите, как часто и насколько успешно вы занимаетесь. Это мотивирует и показывает динамику."
    exercises:
      header: Что здесь есть?
      intro: "Упражнения разделены на блоки, чтобы тренировать разные навыки:"
      0: "<b>Слова:</b> Учимся чётко различать отдельные слова в тишине и в шуме."
      1: "<b>Группы слов (Матрицы):</b> Тренируемся понимать короткие фразы, где логика не подскажет пропущенное слово. Отличная методика для концентрации."
      2: "<b>Фразы:</b> Учимся слышать окончания, предлоги, частицу «НЕ» — то, что часто «теряется»."
      3: "<b>Неречевые звуки (в разработке):</b> Тренировка базового слухового внимания."
    recommendations:
      header: Как лучше заниматься? Главные правила
      0: "<b>Регулярность важнее результата.</b> Оптимально — 30 минут в день, минимум 5-6 раз в неделю."
      1: "<b>Не гонитесь за 100% правильных ответов.</b> Если упражнение даётся тяжело — это хорошо! Значит, мозг активно работает. Повторяйте сложные задания."
      2: "<b>Главная цель — не «отгадать», а максимально вслушаться.</b> Расслабьтесь и сконцентрируйтесь на звуке."
      3: "<b>Не используйте наушники</b> для лучшей имитации нахождения в открытом слуховом пространстве."
    who_we_are:
      header: Кто мы и почему это бесплатно?
      intro:
        "BrainUp — некоммерческий проект, созданный и поддерживаемый командой волонтёров: разработчиков, сурдопедагогов и энтузиастов.
        Мы верим, что помощь в слуховой реабилитации должна быть доступна каждому."
      0: "<b>Методика:</b> основана на разработках ведущего специалиста по слуховой реабилитации, профессора Инны Васильевны Королёвой."
      1: "<b>Контент:</b> подготовлен профессиональными сурдопедагогами."
      2: "<b>Технологии:</b> платформа написана на Kotlin и поддерживается волонтёрами из разных стран."
    help:
      header: Если вы хотите помочь проекту?
      0: Расскажите о нас тем, кому это может быть нужно.
      1: Сообщайте об ошибках или неточностях через специальную форму.
      2: "Если вы IT-специалист (Kotlin, Ember.js, Angular, QA, DevOps, дизайнер) и хотите стать волонтёром — пишите основателю проекта, Елене Мошниковой, в Telegram: "
    welcome: "Добро пожаловать в BrainUp! Ваш путь к более ясному миру звуков начинается здесь."
    cta: Начать тренировку
  dev:
    header: BrainUp для врачей-специалистов
    intro:
      Здесь собраны конкретные факты о методической базе, целевой аудитории и
      специалистах, которые участвуют в развитии BrainUp.
    evidence:
      header: Что уже можно подтвердить
      intro:
        Ниже — данные, которые уже присутствуют в текущих материалах проекта и в
        самом интерфейсе программы.
      0: Методическая база проекта опирается на разработки профессора И.В.
        Королёвой в области слухоречевой реабилитации.
      1: Контент подготовлен совместно с сурдопедагогами и профильными
        специалистами из ПСПбГМУ, РНПЦ оториноларингологии, городских и
        областных центров помощи детям и взрослым с нарушениями слуха.
      2:
        "Ориентир регулярности, заложенный в статистику проекта: 20 минут в
        день, 6 дней в неделю, 2 года. Это соответствует 8 часам 40 минутам
        занятий за 26 дней в месяц."
    audience:
      header: Для каких пациентов подходит тренажер
      0: Для людей после кохлеарной имплантации, которым нужна ежедневная
        слухоречевая практика.
      1: Для слабослышащих пациентов, которые слышат звук, но испытывают
        сложности с разборчивостью речи, особенно в шуме.
      2: Для взрослых и детей от 7 лет, которым нужна последовательная
        тренировка слухового внимания и понимания речи.
    routine:
      header: Как использовать BrainUp в практике
      intro:
        Формат занятий построен так, чтобы пациент мог заниматься регулярно и
        видеть собственную динамику.
      0: Упражнения идут от простого к сложному и адаптируются под текущий
        уровень пользователя.
      1: Внутри личного кабинета доступна статистика по времени, регулярности и
        успешности выполнения.
      2: Программа охватывает распознавание слов, фраз, похожих звуков и
        понимание речи в более сложных акустических сценариях.
    experts:
      header: Специалисты, участвующие в проекте
      intro:
        Ниже — специалисты, уже указанные в проекте как участники методического
        наполнения и практической разработки упражнений.
    note:
      header: Что еще нужно дополнить
      text:
        "Полный блок с клиническими публикациями, авторами, годами, выборками и
        статистикой пока не опубликован. Этот раздел оставлен честным: здесь
        показываются только те факты, которые уже подтверждены текущими
        материалами проекта, без неподтвержденных ссылок и пересказов."
    cta:
      header: Если хотите оценить BrainUp как специалист
      0: "Посмотрите тренажер в работе: "
      1: Открыть страницу специалистов проекта
      2:
        "Если вам нужен пилот, обратная связь по кейсам или обсуждение
        совместной апробации — напишите основателю проекта, Елене Мошниковой,
        в Telegram: "
  team:
    header: Познакомьтесь с нашей командой
    thanks_words: 'Мы рады всем ребятам, которые помогали в разное время, и тем, кто продолжает разрабатывать эту платформу.'
    image_alt: Фото члена команды {i}
  support:
    header: При поддержке

