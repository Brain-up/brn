about_us:
  advantages: Преимущества
  train30: Тренируйтесь всего от 30 минут в день для развития и получения результата
  adv1:
    title: BRAINUP
    content: Первая бесплатная онлайн-программа для взрослых и детей с когнитивными
      проблемами восприятия речи. Все наши занятия рассчитаны на возраст детей
      от 7 лет и старше. Уже сейчас программа насчитывает более 20 разных тем,
      по которым вы можете начать заниматься уже сейчас. А дальше будет еще
      больше — мы планируем постоянно расширять список наших тем.
  adv2:
    title: ОНЛАЙН ЗАНЯТИЯ
    content:  Мы хотели, чтобы формат обучения был максимально удобным для каждого
      нашего пользователя. Именно поэтому наши уроки доступны в любое время.
      Вы можете сами выбрать в какое время вам заниматься, и сформировать
      собственное расписание занятий.
  adv3:
    title: РАЗВИТИЕ
    content: Занимаясь по нашей программе, вы сможете развивать слух в различных
      акустических ситуациях; тренировать слуховую память, прослушивая
      упражнения столько раз, сколько необходимо именно вам. А также
      расширить словарный запас в интересной игровой форме и в дальнейшем
      использовать новые слова в общении с друзьями и знакомыми.

