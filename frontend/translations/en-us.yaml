about_us:
  advantages: How BrainUp works
  train30: Three blocks answer the key questions a visitor has before starting.
  adv1:
    badge: Headphones
    title: TRAIN YOUR HEARING
    content: Listen to sounds, syllables, words, and phrases. Learn to tell
      similar sounds apart, understand speech in noise, and follow phone
      conversations. The trainer adapts to your level from simple to advanced.
  adv2:
    badge: Progress
    title: NOTICE YOUR PROGRESS
    content: Every session strengthens the neural connections responsible for
      hearing. You begin to understand speech better, feel more confident in
      conversations, and regain sounds that seemed lost.
  adv3:
    badge: Hearing specialists
    title: TRUST THE SCIENCE
    content: The exercises are created by hearing specialists and built around
      the principle of brain neuroplasticity. The program is free — BrainUp is
      a charitable project.
