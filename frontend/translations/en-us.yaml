about_us:
  advantages: Advantages
  train30: Train for just 30 minutes a day to develop and achieve results
  adv1:
    title: BRAINUP
    content: The first free online program for adults and children with cognitive
      speech perception problems. All our lessons are designed for children
      aged 7 and older. Currently, the program includes more than 20 different
      topics that you can start working on right away. And there will be even
      more — we plan to constantly expand our list of topics.
  adv2:
    title: ONLINE LESSONS
    content: We wanted the learning format to be as convenient as possible for each
      of our users. That is why our lessons are available at any time.
      You can choose when to study and create your own lesson schedule.
  adv3:
    title: SELF-DEVELOPMENT
    content: By following our program, you will be able to develop your hearing in various
      acoustic situations; train your auditory memory by listening to exercises
      as many times as you need. Additionally, you can expand your vocabulary
      in an engaging, game-like format and later use new words in conversations
      with friends and acquaintances.

index:
  app_info: BrainUP - online classes for children and adults
  app_description: Our site is a platform of interactive exercises for adults and children from the age of seven with cognitive speech perception problems, which helps to train the ability to listen and understand.

