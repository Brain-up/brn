description:
  tabs:
    users: For Users
    developers: For Developers
  users:
    header: "BrainUp — Free Online Hearing and Speech Comprehension Trainer!"
    intro:
      "Welcome! You have come to a unique platform designed to help you or your loved ones hear and understand speech better.
      We don't just amplify sound — we train your brain to recognize words, phrases, sentences, and speech."
    audience:
      header: Who is BrainUp for?
      0:
        "<b>For people after cochlear implantation (CI).</b> After surgery, the brain receives new signals and must learn to 'decode' them.
        BrainUp is your daily rehabilitation, the key to success."
      1:
        "<b>For the hard of hearing and those who are beginning to lose hearing.</b> If you notice that you 'hear but can't make out words',
        especially in noise — that's a sign. The trainer will help maintain and improve speech comprehension skills, slow down isolation."
      2: "<b>For anyone who wants to train auditory attention and perception.</b>"
    importance:
      header: Why is this important?
      text:
        "Hearing problems are often a brain problem, not just an ear problem. The brain loses the ability to process unclear sound signals.
        BrainUp offers scientifically-based training of the auditory cortex, similar to physical exercise for hearing.
        For Russian-speaking people, this is the first and only such free resource."
    how_it_works:
      header: "How does it work? (Just start!)"
      0: "<b>Registration.</b> Create a personal account so we can adapt to you."
      1: "<b>Adaptive start.</b> The system will assess your initial level of speech comprehension."
      2:
        "<b>Personalized training.</b> More than 3,000 audio exercises await you. Their difficulty will automatically adjust
        to your progress: becoming easier or harder to provide optimal workload."
      3: "<b>Progress and statistics.</b> In your personal account, you can always see how often and how successfully you practice. This motivates and shows dynamics."
    exercises:
      header: What's here?
      intro: "Exercises are divided into blocks to train different skills:"
      0: "<b>Words:</b> Learning to clearly distinguish individual words in silence and in noise."
      1: "<b>Word Groups (Matrices):</b> Training to understand short phrases where logic won't hint at the missing word. An excellent methodology for concentration."
      2: "<b>Phrases:</b> Learning to hear endings, prepositions, the particle 'not' — things that are often 'lost'."
      3: "<b>Non-speech sounds (in development):</b> Training basic auditory attention."
    recommendations:
      header: How to practice best? Key rules
      0: "<b>Regularity is more important than results.</b> Optimally — 30 minutes a day, at least 5-6 times a week."
      1: "<b>Don't chase 100% correct answers.</b> If an exercise is difficult — that's good! It means the brain is actively working. Repeat challenging tasks."
      2: "<b>The main goal is not to 'guess' but to listen as closely as possible.</b> Relax and concentrate on the sound."
      3: "<b>Don't use headphones</b> for better simulation of being in an open auditory space."
    who_we_are:
      header: Who are we and why is it free?
      intro:
        "BrainUp is a non-commercial project created and maintained by a team of volunteers: developers, deaf education specialists, and enthusiasts.
        We believe that hearing rehabilitation assistance should be accessible to everyone."
      0: "<b>Methodology:</b> based on developments by the leading specialist in hearing rehabilitation, Professor Inna Vasilievna Koroleva."
      1: "<b>Content:</b> prepared by professional deaf education specialists."
      2: "<b>Technology:</b> the platform is written in Kotlin and maintained by volunteers from different countries."
    help:
      header: Want to help the project?
      0: Tell people who might need it about us.
      1: Report errors or inaccuracies through the special form.
      2: "If you are an IT specialist (Kotlin, Ember.js, Angular, QA, DevOps, designer) and want to volunteer — write to the project founder, Elena Moshnikova, on Telegram: "
    welcome: "Welcome to BrainUp! Your path to a clearer world of sounds starts here."
    cta: Start Training
  dev:
    header: "About '<span class=\"text-indigo-600\">'BrainUp'</span>'"
    intro:
      "Want your code and your decisions to directly change people's quality of life? Join the BrainUp project team."
    done:
      header: What has already been done and is working?
      text:
        "We, a team of volunteers from different countries, have been developing, launching, and maintaining a free
        online trainer for hearing development and speech comprehension since 2019. This is not a prototype. This is a working
        product in production that people are already using today."
      features_header: "Key capabilities of the launched product:"
      features:
        0: More than 3,000 diverse audio exercises.
        1:
          "Smart adaptive system: exercise difficulty automatically adjusts to each user's level of hearing and speech
          comprehension, providing the most effective personalized training."
        2: Personal account with detailed statistics and session dynamics tracking.
        3: Adaptive interface, convenient on any device.
        4: "Stack: Backend written in Kotlin, frontend — Ember.js/Angular."
    target_users:
      header: Who are our users and why is this critically important?
      0:
        "People after cochlear implantation: for them, this is a tool for daily rehabilitation to learn to decode
        new signals from the implant into articulate speech. The success of the entire operation depends on such training."
      1:
        "People with hearing loss (hard of hearing): the trainer helps maintain and train the ability to understand speech in noise,
        slow down the process of isolation, and improve the quality of communication."
      2: Children from age 6 who are beginning to lose hearing.
    uniqueness:
      header: What makes us unique and strong?
      0: A working and free product. Exercises are available to everyone 24/7.
      1: The only scientifically-based analogue for Russian speakers compared to expensive Western programs.
      2: "Based on the methodology of a leading expert (Prof. I.V. Koroleva) and content from leading deaf education specialists."
      3: "We solve the 'I hear but don't understand' problem at the brain signal processing level."
    growth:
      header: The project is alive, growing, and needs development!
      intro: "We face new ambitious tasks, and we really need your hands and expertise:"
      tasks:
        0:
          "Feature development: creating a new hearing diagnostics module for user progress tracking,
          creating new exercise types, deepening analytics, improving the website landing page."
        1: "Scaling and optimization: improving architecture, performance, and fault tolerance for a growing audience."
        2: "UX/UI improvement: making an already convenient interface even more accessible and engaging."
        3: "Testing and reliability: ensuring the highest quality of a constantly evolving product with real users."
    volunteers:
      header: We currently need volunteers
      0: Backend developers (Kotlin)
      1: Frontend developers (Ember.js / Angular)
      2: QA engineers / Autotesters
      3: DevOps / System administrators
      4: UX/UI designers
      5: Product managers and analysts
    benefits:
      header: What will you get by joining?
      0: Real, measurable social impact. You see how your work helps specific people here and now.
      1:
        "Experience working with a production project with real users, complex logic, and a large volume of content
        on a modern technology stack."
      2: "Freedom for technological initiatives within a product that is truly needed."
    cta:
      header: Want to see the product, ask a question, or join?
      0: "Visit and try it yourself: "
      1: Tell colleagues who might find this meaningful.
      2: Tell friends who might benefit as potential users.
      3: "Our codebase and tasks are here: "
      4: "To participate, contact the project founder, Elena Moshnikova, on Telegram: "
    closing: Let's develop a project together that is already working and changing lives.
    signature: "Best regards, BrainUp Project Team."
  team:
    header: Meet our team
    thanks_words: 'We are glad to all the contributors who have helped at different times and those who continue to develop the platform today.'
    image_alt: Team member photo {i}
  support:
    header: With the support

